<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode 144 方法1：递归可视化</title>
  <style>
    :root {
      --bg: #020617;
      --panel: #0f172a;
      --panel-2: #111827;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #38bdf8;
      --green: #22c55e;
      --yellow: #f59e0b;
      --purple: #a78bfa;
      --red: #ef4444;
      --done: #1d4ed8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      background: rgba(2, 6, 23, 0.92);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      color: var(--blue);
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border);
      background: #1e293b;
      color: var(--text);
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    button:hover { border-color: var(--blue); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    input[type="range"] { accent-color: var(--blue); }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
      min-height: calc(100vh - 84px);
    }

    .left, .right {
      padding: 18px;
      min-height: 0;
      overflow: auto;
    }

    .left { border-right: 1px solid var(--border); }

    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card h2, .card h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: var(--blue);
    }

    .status {
      min-height: 68px;
      line-height: 1.7;
      font-size: 14px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .state-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat {
      background: rgba(2, 6, 23, 0.7);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #f8fafc;
      word-break: break-word;
    }

    .visual-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 16px;
      align-items: start;
    }

    .tree-box {
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .edge {
      stroke: #475569;
      stroke-width: 3;
      opacity: 0.8;
    }

    .edge.active {
      stroke: var(--yellow);
      stroke-width: 4;
      opacity: 1;
    }

    .node circle {
      fill: #1e293b;
      stroke: #64748b;
      stroke-width: 3;
      transition: 0.2s ease;
    }

    .node text {
      fill: #e5e7eb;
      font-size: 18px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .node.current circle {
      fill: rgba(56, 189, 248, 0.18);
      stroke: var(--blue);
    }

    .node.visited circle {
      fill: rgba(34, 197, 94, 0.18);
      stroke: var(--green);
    }

    .node.done circle {
      fill: rgba(29, 78, 216, 0.22);
      stroke: #60a5fa;
    }

    .stack-box {
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .stack-title, .legend-title {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .frames {
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      min-height: 180px;
    }

    .frame {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      background: #111827;
      font-size: 13px;
    }

    .frame.active {
      border-color: var(--purple);
      background: rgba(167, 139, 250, 0.16);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 4px;
    }

    .code-block {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .code-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
    }

    .code-line {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 12px;
      padding: 7px 14px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre;
    }

    .code-line.active {
      background: rgba(56, 189, 248, 0.16);
    }

    .line-no {
      color: #64748b;
      text-align: right;
      user-select: none;
    }

    .token-comment { color: #64748b; }
    .token-key { color: #c084fc; }
    .token-fn { color: #38bdf8; }
    .token-var { color: #fbbf24; }

    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid var(--border); }
      .visual-wrap { grid-template-columns: 1fr; }
      .state-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>LeetCode 144 前序遍历 · 方法1 递归</h1>
      <div class="subtitle">左图右代码，按 根 → 左 → 右 一步一步演示递归是如何直接翻译定义的。</div>
    </div>
    <div class="controls">
      <button id="prevBtn">上一步</button>
      <button id="nextBtn">下一步</button>
      <button id="playBtn">自动播放</button>
      <button id="resetBtn">重置</button>
      <div class="range-wrap">
        <span>进度</span>
        <input id="progress" type="range" min="0" max="0" value="0" />
      </div>
      <div class="range-wrap">
        <span>速度</span>
        <input id="speed" type="range" min="300" max="1500" step="100" value="900" />
      </div>
    </div>
  </header>

  <main>
    <section class="left">
      <div class="card">
        <h2>当前步骤</h2>
        <div class="status" id="status"></div>
        <div class="meta">
          <span id="stepInfo"></span>
          <span>最终输出应为 [1, 2, 4, 5, 3, 6]</span>
        </div>
      </div>

      <div class="card">
        <h2>状态</h2>
        <div class="state-grid">
          <div class="stat">
            <div class="stat-label">当前节点</div>
            <div class="stat-value" id="currentNode">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">调用栈深度</div>
            <div class="stat-value" id="stackDepth">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">当前结果</div>
            <div class="stat-value" id="resultView">[]</div>
          </div>
        </div>
      </div>

      <div class="card visual-wrap">
        <div class="tree-box">
          <h3>树的状态</h3>
          <svg viewBox="0 0 520 260" aria-label="binary tree">
            <line id="edge-1-2" class="edge" x1="260" y1="48" x2="160" y2="110"></line>
            <line id="edge-1-3" class="edge" x1="260" y1="48" x2="360" y2="110"></line>
            <line id="edge-2-4" class="edge" x1="160" y1="128" x2="95" y2="196"></line>
            <line id="edge-2-5" class="edge" x1="160" y1="128" x2="225" y2="196"></line>
            <line id="edge-3-6" class="edge" x1="360" y1="128" x2="425" y2="196"></line>

            <g id="node-1" class="node"><circle cx="260" cy="36" r="28"></circle><text x="260" y="36">1</text></g>
            <g id="node-2" class="node"><circle cx="160" cy="120" r="28"></circle><text x="160" y="120">2</text></g>
            <g id="node-3" class="node"><circle cx="360" cy="120" r="28"></circle><text x="360" y="120">3</text></g>
            <g id="node-4" class="node"><circle cx="95" cy="206" r="28"></circle><text x="95" y="206">4</text></g>
            <g id="node-5" class="node"><circle cx="225" cy="206" r="28"></circle><text x="225" y="206">5</text></g>
            <g id="node-6" class="node"><circle cx="425" cy="206" r="28"></circle><text x="425" y="206">6</text></g>
          </svg>
          <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#38bdf8"></span><span>当前节点</span></div>
            <div class="legend-item"><span class="dot" style="background:#22c55e"></span><span>已加入结果</span></div>
            <div class="legend-item"><span class="dot" style="background:#60a5fa"></span><span>已处理完成</span></div>
            <div class="legend-item"><span class="dot" style="background:#f59e0b"></span><span>当前递归方向</span></div>
          </div>
        </div>

        <div class="stack-box">
          <h3>调用栈</h3>
          <div class="stack-title">栈顶显示在最上面</div>
          <div id="frames" class="frames"></div>
        </div>
      </div>
    </section>

    <section class="right">
      <div class="card">
        <h2>核心代码</h2>
        <div class="code-block">
          <div class="code-header">solution_1_recursive.py</div>
          <div id="code"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const codeLines = [
      'def preorderTraversal(self, root):',
      '    ans = []',
      '',
      '    def dfs(node):',
      '        if node is None:',
      '            return',
      '',
      '        ans.append(node.val)',
      '        dfs(node.left)',
      '        dfs(node.right)',
      '',
      '    dfs(root)',
      '    return ans'
    ];

    const treeNodes = ['1', '2', '3', '4', '5', '6'];
    const treeEdges = ['1-2', '1-3', '2-4', '2-5', '3-6'];

    function frameLabel(node) {
      return node === null ? 'dfs(None)' : `dfs(${node})`;
    }

    function makeStep({ title, desc, line, current = null, result = [], stack = [], visited = [], done = [], edge = null }) {
      return { title, desc, line, current, result, stack, visited, done, edge };
    }

    function buildRecursiveSteps() {
      const steps = [];
      const result = [];
      const stack = [];
      const done = new Set();
      const visited = new Set();
      const tree = {
        '1': { left: '2', right: '3' },
        '2': { left: '4', right: '5' },
        '3': { left: null, right: '6' },
        '4': { left: null, right: null },
        '5': { left: null, right: null },
        '6': { left: null, right: null }
      };

      function snapshot(payload) {
        steps.push(makeStep({
          ...payload,
          result: [...result],
          stack: [...stack],
          visited: [...visited],
          done: [...done]
        }));
      }

      function dfs(node, fromEdge = null) {
        stack.push(frameLabel(node));
        if (node === null) {
          snapshot({
            title: '进入空节点',
            desc: '当前 child 是 None，命中递归终止条件，直接返回。',
            line: 5,
            current: null,
            edge: fromEdge
          });
          snapshot({
            title: '空节点返回',
            desc: '执行 return，上一层递归继续往下走。',
            line: 6,
            current: null,
            edge: fromEdge
          });
          stack.pop();
          return;
        }

        snapshot({
          title: `进入 dfs(${node})`,
          desc: `现在开始处理节点 ${node}。递归版的核心就是：先处理自己，再递归左子树，再递归右子树。`,
          line: 4,
          current: node,
          edge: fromEdge
        });

        visited.add(node);
        result.push(Number(node));
        snapshot({
          title: `访问节点 ${node}`,
          desc: `执行 ans.append(${node})。因为前序遍历是 根 → 左 → 右，所以节点一进入就立刻加入答案。`,
          line: 8,
          current: node,
          edge: fromEdge
        });

        snapshot({
          title: `递归左子树`,
          desc: `准备执行 dfs(node.left)。先去节点 ${node} 的左边。`,
          line: 9,
          current: node,
          edge: tree[node].left ? `${node}-${tree[node].left}` : null
        });
        dfs(tree[node].left, tree[node].left ? `${node}-${tree[node].left}` : null);

        snapshot({
          title: `左子树返回到 ${node}`,
          desc: `节点 ${node} 的左子树已经处理完，接下来该递归右子树。`,
          line: 9,
          current: node
        });

        snapshot({
          title: `递归右子树`,
          desc: `准备执行 dfs(node.right)。现在转向节点 ${node} 的右边。`,
          line: 10,
          current: node,
          edge: tree[node].right ? `${node}-${tree[node].right}` : null
        });
        dfs(tree[node].right, tree[node].right ? `${node}-${tree[node].right}` : null);

        done.add(node);
        snapshot({
          title: `完成节点 ${node}`,
          desc: `节点 ${node} 的左右子树都处理完了，这一层递归结束，返回上一层。`,
          line: 10,
          current: node
        });

        stack.pop();
      }

      snapshot({
        title: '开始遍历',
        desc: '先创建答案数组 ans，然后从 dfs(root) 开始。',
        line: 2,
        current: null
      });
      snapshot({
        title: '调用 dfs(root)',
        desc: '现在开始从根节点 1 进入递归。',
        line: 12,
        current: '1'
      });
      dfs('1');
      snapshot({
        title: '返回结果',
        desc: '所有节点都已经按前序顺序访问完毕，最后返回答案。',
        line: 13,
        current: null
      });
      return steps;
    }

    const steps = buildRecursiveSteps();
    const statusEl = document.getElementById('status');
    const stepInfoEl = document.getElementById('stepInfo');
    const currentNodeEl = document.getElementById('currentNode');
    const stackDepthEl = document.getElementById('stackDepth');
    const resultViewEl = document.getElementById('resultView');
    const framesEl = document.getElementById('frames');
    const codeEl = document.getElementById('code');
    const progressEl = document.getElementById('progress');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const speedEl = document.getElementById('speed');

    let currentStep = 0;
    let timer = null;

    function renderCode() {
      codeEl.innerHTML = '';
      codeLines.forEach((line, index) => {
        const row = document.createElement('div');
        row.className = 'code-line';
        row.dataset.line = index + 1;
        row.innerHTML = `<div class="line-no">${index + 1}</div><div>${escapeHtml(line)}</div>`;
        codeEl.appendChild(row);
      });
    }

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function clearHighlights() {
      treeNodes.forEach(id => {
        document.getElementById(`node-${id}`).className.baseVal = 'node';
      });
      treeEdges.forEach(id => {
        document.getElementById(`edge-${id}`).className.baseVal = 'edge';
      });
      document.querySelectorAll('.code-line').forEach(line => line.classList.remove('active'));
    }

    function renderFrames(stack) {
      framesEl.innerHTML = '';
      stack.forEach((frame, index) => {
        const div = document.createElement('div');
        div.className = 'frame' + (index === stack.length - 1 ? ' active' : '');
        div.textContent = frame;
        framesEl.appendChild(div);
      });
    }

    function renderStep(index) {
      const step = steps[index];
      clearHighlights();

      statusEl.innerHTML = `<strong>${step.title}</strong><br>${step.desc}`;
      stepInfoEl.textContent = `步骤 ${index + 1} / ${steps.length}`;
      currentNodeEl.textContent = step.current ?? 'None';
      stackDepthEl.textContent = String(step.stack.length);
      resultViewEl.textContent = `[${step.result.join(', ')}]`;
      progressEl.value = index;

      if (step.line) {
        const lineEl = document.querySelector(`.code-line[data-line="${step.line}"]`);
        if (lineEl) lineEl.classList.add('active');
      }

      step.visited.forEach(id => {
        const node = document.getElementById(`node-${id}`);
        if (node) node.classList.add('visited');
      });
      step.done.forEach(id => {
        const node = document.getElementById(`node-${id}`);
        if (node) node.classList.add('done');
      });
      if (step.current && !step.done.includes(step.current)) {
        const node = document.getElementById(`node-${step.current}`);
        if (node) node.classList.add('current');
      }
      if (step.edge) {
        const edge = document.getElementById(`edge-${step.edge}`);
        if (edge) edge.classList.add('active');
      }

      renderFrames(step.stack);
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === steps.length - 1;
    }

    function stopPlay() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      playBtn.textContent = '自动播放';
    }

    function nextStep() {
      if (currentStep < steps.length - 1) {
        currentStep += 1;
        renderStep(currentStep);
      } else {
        stopPlay();
      }
    }

    prevBtn.addEventListener('click', () => {
      stopPlay();
      if (currentStep > 0) {
        currentStep -= 1;
        renderStep(currentStep);
      }
    });

    nextBtn.addEventListener('click', () => {
      stopPlay();
      nextStep();
    });

    playBtn.addEventListener('click', () => {
      if (timer) {
        stopPlay();
        return;
      }
      playBtn.textContent = '暂停';
      timer = setInterval(nextStep, Number(speedEl.value));
    });

    resetBtn.addEventListener('click', () => {
      stopPlay();
      currentStep = 0;
      renderStep(currentStep);
    });

    progressEl.addEventListener('input', (e) => {
      stopPlay();
      currentStep = Number(e.target.value);
      renderStep(currentStep);
    });

    speedEl.addEventListener('input', () => {
      if (timer) {
        stopPlay();
        playBtn.click();
      }
    });

    progressEl.max = steps.length - 1;
    renderCode();
    renderStep(0);
  </script>
</body>
</html>
