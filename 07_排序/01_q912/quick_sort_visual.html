<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三路快排可视化</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #0f1117; color: #e1e4e8; min-height: 100vh; display: flex; flex-direction: column; }

  header { padding: 16px 32px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; flex-shrink: 0; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 600; color: #58a6ff; }
  header .badge { font-size: 11px; background: #238636; color: #fff; padding: 2px 8px; border-radius: 10px; }
  .controls { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .controls button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all .15s; }
  .controls button:hover:not(:disabled) { background: #30363d; border-color: #58a6ff; }
  .controls button:active:not(:disabled) { transform: scale(.97); }
  .controls button.active { background: #238636; border-color: #2ea043; color: #fff; }
  .controls button:disabled { opacity: .4; cursor: not-allowed; }
  .controls label { font-size: 12px; color: #8b949e; }
  .controls input[type=range] { width: 80px; accent-color: #58a6ff; }

  .main { flex: 1; display: flex; overflow: hidden; }

  .anim-panel { flex: 1; display: flex; flex-direction: column; padding: 24px; border-right: 1px solid #30363d; min-width: 0; }
  .anim-panel h2 { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .bar-container { flex: 1; display: flex; align-items: flex-end; justify-content: center; gap: 3px; padding: 20px 0; min-height: 200px; }
  .bar-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 0 0 auto; }
  .bar { width: 32px; border-radius: 4px 4px 0 0; transition: height .3s ease, background .2s ease, transform .2s ease; position: relative; }
  .bar .val { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #8b949e; white-space: nowrap; }
  .bar.default { background: #3b434b; }
  .bar.pivot { background: #58a6ff; }
  .bar.less { background: #3fb950; }
  .bar.greater { background: #f85149; }
  .bar.comparing { background: #d29922; transform: scaleY(1.05); }
  .bar.swapping { background: #f0883e; transform: scale(1.08); }
  .bar.sorted { background: linear-gradient(180deg, #a5d6ff 0%, #3b434b 100%); }

  .range-indicator { display: flex; justify-content: center; gap: 3px; margin-bottom: 4px; min-height: 16px; }
  .range-cell { width: 32px; text-align: center; font-size: 10px; color: #484f58; }

  .status { margin-top: 12px; padding: 10px 14px; background: #161b22; border-radius: 8px; font-size: 12px; color: #c9d1d9; min-height: 40px; border: 1px solid #30363d; }
  .status .highlight { color: #58a6ff; font-weight: 600; }

  .step-counter { margin-top: 8px; font-size: 11px; color: #484f58; text-align: center; }

  .code-panel { width: 440px; display: flex; flex-direction: column; flex-shrink: 0; background: #0d1117; }
  .code-panel h2 { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; padding: 16px 20px 8px; }

  .code-container { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
  .code-block { font-size: 12px; line-height: 1.8; }
  .code-line { display: flex; gap: 8px; padding: 2px 8px; border-radius: 4px; transition: all .2s; border-left: 3px solid transparent; }
  .code-line.active { background: rgba(88, 166, 255, .12); border-left-color: #58a6ff; }
  .code-line .ln { color: #484f58; min-width: 20px; text-align: right; user-select: none; }
  .code-line .code { color: #c9d1d9; white-space: pre; }
  .code-line .code .kw { color: #ff7b72; }
  .code-line .code .fn { color: #d2a8ff; }
  .code-line .code .str { color: #a5d6ff; }
  .code-line .code .num { color: #79c0ff; }
  .code-line .code .cmt { color: #484f58; font-style: italic; }
  .code-line .code .var { color: #ffa657; }
  .code-line .code .param { color: #79c0ff; }

  .call-stack { padding: 10px 14px; background: #161b22; border-radius: 8px; font-size: 11px; color: #8b949e; border: 1px solid #30363d; max-height: 100px; overflow-y: auto; margin: 0 20px 20px; }
  .call-stack .title { color: #58a6ff; font-weight: 600; margin-bottom: 4px; }
  .call-stack .frame { padding: 2px 0; }

  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .anim-panel { border-right: none; border-bottom: 1px solid #30363d; }
    .code-panel { width: 100%; max-height: 400px; }
  }
</style>
</head>
<body>

<header>
  <h1>三路快排可视化</h1>
  <span class="badge">3-way Quick Sort</span>
  <div class="controls">
    <button id="btnRandom">随机数组</button>
    <button id="btnStepPrev">◀ 上一步</button>
    <button id="btnStep">下一步 ▶</button>
    <button id="btnAuto">自动播放 ▶▶</button>
    <button id="btnReset">重置</button>
    <label>速度</label>
    <input type="range" id="speed" min="1" max="10" value="5">
    <label id="speedLabel">5</label>
  </div>
</header>

<div class="main">
  <div class="anim-panel">
    <h2>动画演示</h2>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3b434b"></div>未处理</div>
      <div class="legend-item"><div class="legend-dot" style="background:#58a6ff"></div>pivot</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div>&lt; pivot</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div>&gt; pivot</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d29922"></div>比较中</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f0883e"></div>交换中</div>
    </div>
    <div class="range-indicator" id="rangeIndicator"></div>
    <div class="bar-container" id="barContainer"></div>
    <div class="status" id="status">点击 <span class="highlight">下一步 ▶</span> 单步执行，或 <span class="highlight">自动播放 ▶▶</span> 连续执行</div>
    <div class="step-counter" id="stepCounter"></div>
  </div>

  <div class="code-panel">
    <h2>对应代码</h2>
    <div class="code-container">
      <div class="code-block" id="codeBlock"></div>
    </div>
    <div class="call-stack">
      <div class="title">调用栈</div>
      <div id="stackFrames">（空）</div>
    </div>
  </div>
</div>

<script>
const CODE_LINES = [
  { id: 1, html: `<span class="kw">def</span> <span class="fn">quick_sort</span>(<span class="param">left</span>, <span class="param">right</span>):` },
  { id: 2, html: `    <span class="kw">if</span> <span class="param">left</span> >= <span class="param">right</span>: <span class="kw">return</span>` },
  { id: 3, html: `    <span class="var">pivot</span> = nums[<span class="fn">random</span>.<span class="fn">randint</span>(<span class="param">left</span>, <span class="param">right</span>)]` },
  { id: 4, html: `    <span class="var">lt</span> = <span class="param">left</span>` },
  { id: 5, html: `    <span class="var">i</span> = <span class="param">left</span>` },
  { id: 6, html: `    <span class="var">gt</span> = <span class="param">right</span>` },
  { id: 7, html: `    <span class="kw">while</span> <span class="var">i</span> <= <span class="var">gt</span>:` },
  { id: 8, html: `        <span class="kw">if</span> nums[<span class="var">i</span>] < <span class="var">pivot</span>:` },
  { id: 9, html: `            nums[<span class="var">lt</span>], nums[<span class="var">i</span>] = nums[<span class="var">i</span>], nums[<span class="var">lt</span>]` },
  { id: 10, html: `            <span class="var">lt</span> += <span class="num">1</span>` },
  { id: 11, html: `            <span class="var">i</span> += <span class="num">1</span>` },
  { id: 12, html: `        <span class="kw">elif</span> nums[<span class="var">i</span>] > <span class="var">pivot</span>:` },
  { id: 13, html: `            nums[<span class="var">i</span>], nums[<span class="var">gt</span>] = nums[<span class="var">gt</span>], nums[<span class="var">i</span>]` },
  { id: 14, html: `            <span class="var">gt</span> -= <span class="num">1</span>` },
  { id: 15, html: `        <span class="kw">else</span>: <span class="var">i</span> += <span class="num">1</span>` },
  { id: 16, html: `    <span class="fn">quick_sort</span>(<span class="param">left</span>, <span class="var">lt</span> - <span class="num">1</span>)` },
  { id: 17, html: `    <span class="fn">quick_sort</span>(<span class="var">gt</span> + <span class="num">1</span>, <span class="param">right</span>)` },
];

let nums = [7, 3, 9, 5, 4, 6, 2, 8, 1];
let originalNums = [...nums];
let steps = [];
let currentStep = -1;
let autoPlaying = false;
let autoTimer = null;
let animationSpeed = 5;
let sortDone = false;

const $ = id => document.getElementById(id);
const barContainer = $('barContainer');
const rangeIndicator = $('rangeIndicator');
const statusEl = $('status');
const codeBlock = $('codeBlock');
const stackFrames = $('stackFrames');
const btnStep = $('btnStep');
const btnStepPrev = $('btnStepPrev');
const btnAuto = $('btnAuto');
const btnReset = $('btnReset');
const btnRandom = $('btnRandom');
const speedSlider = $('speed');
const speedLabel = $('speedLabel');
const stepCounter = $('stepCounter');

btnStepPrev.disabled = true;

// Render code panel
codeBlock.innerHTML = CODE_LINES.map(l =>
  `<div class="code-line" id="codeline-${l.id}"><span class="ln">${l.id}</span><span class="code">${l.html}</span></div>`
).join('');

function renderBars(pivotVal = null, regions = {}) {
  const maxVal = Math.max(...nums);
  barContainer.innerHTML = nums.map((v, idx) => {
    const h = Math.max(20, (v / maxVal) * 160);
    let cls = 'bar default';
    if (regions.sorted) {
      cls = 'bar sorted';
    } else if (regions.left !== undefined) {
      if (idx >= regions.left && idx < regions.lt) cls = 'bar less';
      else if (idx > regions.gt && idx <= regions.right) cls = 'bar greater';
      else if (v === pivotVal) cls = 'bar pivot';
    }
    if (regions.comparing === idx) cls = 'bar comparing';
    if (regions.swapping && regions.swapping.includes(idx)) cls = 'bar swapping';
    return `<div class="bar-wrapper"><div class="bar ${cls}" style="height:${h}px"><span class="val">${v}</span></div></div>`;
  }).join('');
  // Render pointers (lt, i, gt)
  if (regions.left !== undefined) {
    rangeIndicator.innerHTML = nums.map((v, idx) => {
      let labels = [];
      if (idx === regions.lt) labels.push('lt');
      if (idx === regions.i) labels.push('i');
      if (idx === regions.gt) labels.push('gt');
      return `<div class="range-cell">${labels.join('<br>')}</div>`;
    }).join('');
  } else {
    rangeIndicator.innerHTML = '';
  }
}

function highlightLine(id) {
  document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));
  if (id) {
    const el = $('codeline-' + id);
    if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }
  }
}

function updateStack(stack) {
  if (!stack.length) { stackFrames.innerHTML = '（空）'; return; }
  stackFrames.innerHTML = stack.map((f, i) =>
    `<div class="frame">${'&nbsp;'.repeat(i * 4)}#${i} quick_sort(${f.left}, ${f.right})</div>`
  ).join('');
}

function applyStep(idx) {
  const s = steps[idx];
  nums = [...s.arr];
  highlightLine(s.line);
  statusEl.innerHTML = s.status;
  updateStack(s.stack);
  renderBars(s.pivot, s.regions);
  stepCounter.textContent = `步骤 ${idx + 1} / ${steps.length}`;
  if (idx >= steps.length - 1) {
    sortDone = true;
    btnStep.disabled = true;
    btnAuto.disabled = true;
    if (autoPlaying) stopAuto();
  } else {
    sortDone = false;
    btnStep.disabled = false;
  }
}

// ==================== Pre-compute all steps ====================
function precomputeSort(arr) {
  const log = [];
  const a = [...arr];

  function qs(left, right, stack) {
    log.push({ arr: [...a], line: 1, pivot: null, regions: {}, status: `quick_sort(${left}, ${right}) — 函数入口`, stack: [...stack, { left, right }] });
    if (left >= right) {
      log.push({ arr: [...a], line: 2, pivot: null, regions: {}, status: `left(${left}) >= right(${right})，直接返回`, stack: [...stack] });
      return;
    }
    const pivot = a[Math.floor(Math.random() * (right - left + 1)) + left];
    log.push({ arr: [...a], line: 3, pivot, regions: { left, right, lt: left, i: left, gt: right }, status: `选取 <span class="highlight">pivot = ${pivot}</span>`, stack: [...stack, { left, right }] });
    let lt = left, i = left, gt = right;
    log.push({ arr: [...a], line: 4, pivot, regions: { left, right, lt, i, gt }, status: `<span class="var">lt</span> = ${lt}`, stack: [...stack, { left, right }] });
    log.push({ arr: [...a], line: 5, pivot, regions: { left, right, lt, i, gt }, status: `<span class="var">i</span> = ${i}`, stack: [...stack, { left, right }] });
    log.push({ arr: [...a], line: 6, pivot, regions: { left, right, lt, i, gt }, status: `<span class="var">gt</span> = ${gt}`, stack: [...stack, { left, right }] });

    while (i <= gt) {
      log.push({ arr: [...a], line: 7, pivot, regions: { left, right, lt, i, gt }, status: `while i=${i} <= gt=${gt}`, stack: [...stack, { left, right }] });
      if (a[i] < pivot) {
        log.push({ arr: [...a], line: 8, pivot, regions: { left, right, lt, i, gt, comparing: i }, status: `a[${i}]=${a[i]} < pivot(${pivot}) — <span class="highlight">小于</span>`, stack: [...stack, { left, right }] });
        log.push({ arr: [...a], line: 9, pivot, regions: { left, right, lt, i, gt, swapping: [lt, i] }, status: `交换 a[${lt}](${a[lt]}) ↔ a[${i}](${a[i]})`, stack: [...stack, { left, right }] });
        [a[lt], a[i]] = [a[i], a[lt]];
        lt++;
        log.push({ arr: [...a], line: 10, pivot, regions: { left, right, lt, i, gt }, status: `lt→${lt}`, stack: [...stack, { left, right }] });
        i++;
        log.push({ arr: [...a], line: 11, pivot, regions: { left, right, lt, i, gt }, status: `i→${i}`, stack: [...stack, { left, right }] });
      } else if (a[i] > pivot) {
        log.push({ arr: [...a], line: 12, pivot, regions: { left, right, lt, i, gt, comparing: i }, status: `a[${i}]=${a[i]} > pivot(${pivot}) — <span class="highlight">大于</span>`, stack: [...stack, { left, right }] });
        log.push({ arr: [...a], line: 13, pivot, regions: { left, right, lt, i, gt, swapping: [i, gt] }, status: `交换 a[${i}](${a[i]}) ↔ a[${gt}](${a[gt]})`, stack: [...stack, { left, right }] });
        [a[i], a[gt]] = [a[gt], a[i]];
        gt--;
        log.push({ arr: [...a], line: 14, pivot, regions: { left, right, lt, i, gt }, status: `gt→${gt}（i不动）`, stack: [...stack, { left, right }] });
      } else {
        log.push({ arr: [...a], line: 15, pivot, regions: { left, right, lt, i, gt, comparing: i }, status: `a[${i}]=${a[i]} == pivot(${pivot}) — <span class="highlight">等于</span>`, stack: [...stack, { left, right }] });
        i++;
        log.push({ arr: [...a], line: 15, pivot, regions: { left, right, lt, i, gt }, status: `i→${i}`, stack: [...stack, { left, right }] });
      }
    }
    log.push({ arr: [...a], line: 16, pivot, regions: { left, right, lt, i, gt }, status: `递归左侧: quick_sort(${left}, ${lt - 1})`, stack: [...stack, { left, right }] });
    qs(left, lt - 1, stack);
    log.push({ arr: [...a], line: 17, pivot, regions: { left, right, lt, i, gt }, status: `递归右侧: quick_sort(${gt + 1}, ${right})`, stack: [...stack, { left, right }] });
    qs(gt + 1, right, stack);
  }
  qs(0, a.length - 1, []);
  return log;
}

function initSort() {
  if (steps.length > 0) return;
  steps = precomputeSort(originalNums);
  currentStep = -1;
  sortDone = false;
}

function stepNext() {
  initSort();
  if (sortDone || currentStep >= steps.length - 1) return;
  currentStep++;
  applyStep(currentStep);
  btnStepPrev.disabled = false;
}

function stepPrev() {
  if (currentStep <= 0) return;
  currentStep--;
  applyStep(currentStep);
  if (currentStep <= 0) btnStepPrev.disabled = true;
}

function toggleAuto() {
  if (autoPlaying) { stopAuto(); return; }
  initSort();
  if (sortDone) return;
  autoPlaying = true;
  btnAuto.textContent = '暂停 ⏸';
  btnAuto.classList.add('active');
  btnRandom.disabled = true;
  doAutoStep();
}

function stopAuto() {
  autoPlaying = false;
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  btnAuto.textContent = '自动播放 ▶▶';
  btnAuto.classList.remove('active');
  btnRandom.disabled = false;
}

function doAutoStep() {
  if (!autoPlaying) return;
  if (currentStep >= steps.length - 1) { stopAuto(); return; }
  currentStep++;
  applyStep(currentStep);
  autoTimer = setTimeout(doAutoStep, 1100 - animationSpeed * 100);
}

function generateRandom() {
  if (autoPlaying) stopAuto();
  const size = 10 + Math.floor(Math.random() * 6);
  nums = Array.from({ length: size }, () => Math.floor(Math.random() * 20) + 1);
  originalNums = [...nums];
  steps = [];
  currentStep = -1;
  sortDone = false;
  btnStep.disabled = false;
  btnStepPrev.disabled = true;
  btnAuto.disabled = false;
  btnRandom.disabled = false;
  highlightLine(null);
  stepCounter.textContent = '';
  renderBars();
  statusEl.innerHTML = '已生成新数组，点击 <span class="highlight">下一步 ▶</span> 或 <span class="highlight">自动播放 ▶▶</span>';
  updateStack([]);
}

function resetAll() {
  stopAuto();
  nums = [...originalNums];
  steps = [];
  currentStep = -1;
  sortDone = false;
  btnStep.disabled = false;
  btnStepPrev.disabled = true;
  btnAuto.disabled = false;
  btnRandom.disabled = false;
  highlightLine(null);
  stepCounter.textContent = '';
  renderBars();
  statusEl.innerHTML = '点击 <span class="highlight">下一步 ▶</span> 单步执行，或 <span class="highlight">自动播放 ▶▶</span> 连续执行';
  updateStack([]);
}

speedSlider.addEventListener('input', () => {
  animationSpeed = parseInt(speedSlider.value);
  speedLabel.textContent = animationSpeed;
});

btnStepPrev.addEventListener('click', stepPrev);
btnStep.addEventListener('click', stepNext);
btnAuto.addEventListener('click', toggleAuto);
btnReset.addEventListener('click', resetAll);
btnRandom.addEventListener('click', generateRandom);

renderBars();
</script>
</body>
</html>
